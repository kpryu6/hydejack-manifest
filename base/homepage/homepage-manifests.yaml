apiVersion: v1
kind: Namespace
metadata:
  name: homepage
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: homepage
  namespace: homepage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homepage
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homepage
roleRef:
  apiGroups: ["rbac.authorization.k8s.io"]
  kind: ClusterRole
  name: homepage
subjects:
  - kind: ServiceAccount
    name: homepage
    namespace: homepage
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: Thompson's HomeLab
    background: https://images.unsplash.com/photo-1550745165-9bc0b252728f?q=80&w=2070&auto=format&fit=crop
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
    - datetime:
        format:
          date: long
          time: short
  services.yaml: |
    - Infrastructure:
        - Pi-hole:
            icon: pi-hole
            href: http://192.168.219.220/admin
            description: Local DNS Server
        - Proxmox:
            icon: proxmox
            href: https://192.168.219.200:8006
            description: Hypervisor
    - Kubernetes Services:
        - Portfolio:
            icon: mdi-briefcase
            href: https://kpryu.sytes.net
            description: My Portfolio Site
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      serviceAccountName: homepage
      containers:
        - name: homepage
          image: ghcr.io/benphelps/homepage:latest
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: config
              mountPath: /app/config
      volumes:
        - name: config
          configMap:
            name: homepage-config
---
apiVersion: v1
kind: Service
metadata:
  name: homepage-service
  namespace: homepage
spec:
  ports:
    - port: 80
      targetPort: 3000
  selector:
    app: homepage
